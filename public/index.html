<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Management</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 380px;
    background: #ff8c00;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    color: white;
}

h2 {
    margin: 0 0 20px;
    text-align: center;
    font-size: 26px;
}

label {
    display: block;
    margin: 4px 0 6px;
    font-weight: 700;
}

input,
select,
textarea,
button {
    width: 100%;
    font: inherit;
    border-radius: 8px;
}

input,
select,
textarea {
    display: block;
    padding: 11px;
    margin-bottom: 12px;
    border: none;
    outline: none;
}

textarea {
    min-height: 90px;
    resize: vertical;
}

button {
    padding: 12px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 4px;
    font-weight: 700;
}

button:hover {
    background: #222;
}

button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

.message {
    min-height: 20px;
    margin-top: 12px;
    text-align: center;
    font-weight: 700;
}
</style>
</head>

<body>
<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="logo.png" alt="ACC Logo" style="max-width: 100%; height: auto; max-height: 80px; object-fit: contain;">
    </div>
    <h2>Apply Leave</h2>

    <form id="form">
        <input name="name" placeholder="Full Name" required>
        <input name="employeeId" placeholder="Employee ID (e.g. ACC-FTDA-2026-034)" pattern="^ACC-[a-zA-Z]+-\d{4}-\d+$" title="Format must be ACC-xxxx-yyyy-123 (e.g. ACC-FTDA-2026-034)" required>

        <label for="startDate">Start Date</label>
        <input id="startDate" type="date" name="startDate" required>

        <label for="endDate">End Date</label>
        <input id="endDate" type="date" name="endDate" required>

        <select name="batch" required>
            <option value="">Select Batch</option>
            <option>Full Time</option>
            <option>Part Time</option>
        </select>

        <textarea name="reason" placeholder="Reason for leave" required></textarea>
        <input type="email" name="email" placeholder="Email" required>

        <button id="submitBtn" type="submit">Apply Leave</button>
        <div id="message" class="message"></div>
    </form>
</div>

<script>
const API_BASE = location.protocol === "file:" ? "http://localhost:3000" : "";
const form = document.getElementById("form");
const submitBtn = document.getElementById("submitBtn");
const message = document.getElementById("message");

form.addEventListener("submit", async (event) => {
    event.preventDefault();

    const data = Object.fromEntries(new FormData(form));
    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";
    message.textContent = "";

    try {
        const res = await fetch(API_BASE + "/apply-leave", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const text = await res.text();

        if (!res.ok) {
            message.textContent = text || "Leave ia not submitted start server";
            return;
        }

        message.textContent = text || "Leave Applied Successfully";
        form.reset();
    } catch (err) {
        message.textContent = "Server is not start";
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Apply Leave";
    }
});
</script>
</body>
</html>
